<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Manager - AGM Real Estate Group</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --black:#111;--off-white:#f5f3ef;--white:#fff;
            --gray-100:#fafaf8;--gray-200:#eceae4;--gray-300:#d4d1ca;--gray-400:#a8a49c;--gray-500:#7a766e;--gray-600:#5a5750;
            --text:#1a1a1a;--text-light:#6b6760;--text-mid:#8a857e;
            --border:#e5e1da;--border-light:#eceae4;
            --booked:#b45309;--booked-light:#fef3c7;--booked-border:#f59e0b;
            --danger:#c0392b;--danger-light:#fef2f2;
            --card:#fff;--bg:#f5f3ef;
            --radius:12px;--radius-lg:16px;
            --shadow:0 1px 3px rgba(0,0,0,0.06);--shadow-sm:0 1px 2px rgba(0,0,0,0.04);--shadow-lg:0 8px 30px rgba(0,0,0,0.1);
            --transition:0.2s ease;
        }
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}

        /* TOPBAR */
        .topbar{background:var(--black);color:white;padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .topbar-left{display:flex;align-items:center;gap:14px}
        .topbar-brand{font-family:'DM Serif Display',serif;font-size:1rem;font-weight:400;opacity:.7}
        .topbar-divider{width:1px;height:24px;background:rgba(255,255,255,.18)}
        .topbar-property-select{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;padding:6px 32px 6px 12px;border-radius:8px;font-size:.88rem;font-weight:500;font-family:inherit;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;max-width:280px}
        .topbar-property-select:focus{outline:none;border-color:rgba(255,255,255,.4)}
        .topbar-property-select option{color:var(--text);background:var(--white)}
        .topbar-actions{display:flex;gap:8px;align-items:center}
        .topbar-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:white;padding:7px 14px;border-radius:8px;font-size:.8rem;font-weight:500;cursor:pointer;font-family:inherit;transition:background var(--transition)}
        .topbar-btn:hover{background:rgba(255,255,255,.2)}
        .topbar-btn.danger{background:rgba(220,38,38,.15);border-color:rgba(220,38,38,.25)}
        .topbar-btn.danger:hover{background:rgba(220,38,38,.3)}

        /* LOGIN */
        .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--bg)}
        .login-card{background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:48px 40px;width:100%;max-width:420px;border:1px solid var(--border-light)}
        .login-brand{font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.08em;margin-bottom:20px}
        .login-heading{font-family:'DM Serif Display',serif;font-size:1.8rem;font-weight:400;color:var(--black);margin-bottom:6px}
        .login-sub{font-size:.9rem;color:var(--text-light);margin-bottom:32px;font-weight:300}
        .form-group{margin-bottom:20px}
        .form-label{display:block;font-size:.8rem;font-weight:600;color:var(--gray-600);margin-bottom:6px;letter-spacing:.02em}
        .form-select,.form-input{width:100%;padding:12px 16px;border:2px solid var(--gray-200);border-radius:var(--radius);font-size:.95rem;font-family:inherit;color:var(--text);background:var(--card);transition:border-color var(--transition);outline:none;-webkit-appearance:none}
        .form-select{background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%236b6760' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px}
        .form-select:focus,.form-input:focus{border-color:var(--black)}
        .form-btn{width:100%;padding:14px;background:var(--black);color:white;border:none;border-radius:var(--radius);font-size:.95rem;font-weight:600;font-family:inherit;cursor:pointer;transition:background var(--transition);margin-top:8px}
        .form-btn:hover{background:#2a2a2a}
        .form-btn:disabled{background:var(--gray-300);cursor:not-allowed}
        .form-error{background:var(--danger-light);color:var(--danger);padding:12px 16px;border-radius:var(--radius);font-size:.85rem;margin-bottom:16px;display:none;line-height:1.4;border:1px solid #fecaca}
        .form-error.active{display:block}
        .login-toggle{text-align:center;margin-top:20px;font-size:.85rem;color:var(--text-light)}
        .login-toggle a{color:var(--black);text-decoration:underline;font-weight:600;cursor:pointer}

        /* DASHBOARD */
        .dashboard{display:none}.dashboard.active{display:block}.login-screen.hidden{display:none}
        .dash-body{padding:24px 28px;max-width:1100px;margin:0 auto}
        .stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
        .stat-card{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius);padding:16px 22px;flex:1;min-width:140px;box-shadow:var(--shadow-sm)}
        .stat-num{font-family:'DM Serif Display',serif;font-size:1.8rem;font-weight:400;color:var(--text);line-height:1.2}
        .stat-num.green{color:var(--black)}.stat-num.amber{color:var(--booked)}
        .stat-label{font-size:.78rem;color:var(--text-light);font-weight:500;margin-top:4px}
        .week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
        .week-nav{display:flex;align-items:center;gap:8px}
        .week-label{font-family:'DM Serif Display',serif;font-size:1.15rem;font-weight:400;color:var(--black);min-width:220px;text-align:center}
        .nav-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:2px solid var(--gray-200);background:var(--card);border-radius:10px;cursor:pointer;font-size:1.2rem;color:var(--text);transition:all var(--transition);font-family:inherit;line-height:1}
        .nav-btn:hover{border-color:var(--black);color:var(--black)}
        .today-btn{padding:8px 16px;background:var(--card);border:2px solid var(--gray-200);border-radius:10px;font-size:.82rem;font-weight:600;font-family:inherit;cursor:pointer;color:var(--text);transition:all var(--transition)}
        .today-btn:hover{border-color:var(--black);color:var(--black)}
        .add-slot-btn{padding:10px 20px;background:var(--black);color:white;border:none;border-radius:10px;font-size:.88rem;font-weight:600;font-family:inherit;cursor:pointer;transition:background var(--transition);display:flex;align-items:center;gap:6px}
        .add-slot-btn:hover{background:#2a2a2a}

        /* Calendar */
        .calendar-card{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border-light);box-shadow:var(--shadow);overflow:hidden}
        .cal-grid{display:grid;grid-template-columns:72px repeat(7,1fr);min-height:500px}
        .cal-header-cell{padding:14px 6px;text-align:center;border-bottom:2px solid var(--border);border-left:1px solid var(--border-light);background:var(--gray-100)}
        .cal-header-cell:first-child{border-left:none}
        .cal-day-name{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-500)}
        .cal-day-num{font-size:1.15rem;font-weight:700;color:var(--text);margin-top:2px}
        .cal-header-cell.today .cal-day-num{background:var(--black);color:white;width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:1rem}
        .cal-header-corner{padding:14px 6px;border-bottom:2px solid var(--border);background:var(--gray-100);display:flex;align-items:flex-end;justify-content:center}
        .cal-header-corner span{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-500)}
        .cal-body{display:grid;grid-template-columns:72px repeat(7,1fr)}
        .cal-time-col{border-right:1px solid var(--border-light)}
        .cal-time-label{height:48px;display:flex;align-items:flex-start;justify-content:center;padding-top:0;font-size:.72rem;font-weight:500;color:var(--gray-500);position:relative;top:-7px}
        .cal-day-col{border-left:1px solid var(--border-light);position:relative;min-height:576px}
        .cal-hour-line{position:absolute;left:0;right:0;height:1px;background:var(--border-light)}
        .slot-block{position:absolute;left:3px;right:3px;border-radius:8px;padding:4px 7px;font-size:.74rem;font-weight:500;cursor:pointer;transition:box-shadow var(--transition),transform .1s;overflow:hidden;z-index:2;line-height:1.3}
        .slot-block:hover{transform:scale(1.02);z-index:3}
        .slot-block.available{background:var(--gray-100);border:1.5px solid var(--gray-300);color:var(--text)}
        .slot-block.available:hover{box-shadow:0 2px 8px rgba(0,0,0,.12);border-color:var(--black)}
        .slot-block.booked{background:var(--booked-light);border:1.5px solid var(--booked-border);color:var(--booked)}
        .slot-block.booked:hover{box-shadow:0 2px 8px rgba(217,119,6,.2)}
        .slot-time{font-weight:600;font-size:.72rem}.slot-label{font-size:.68rem;opacity:.85;margin-top:1px}
        .cal-day-col .click-zone{position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;cursor:pointer}
        .cal-day-col .click-zone:hover{background:rgba(17,17,17,.02)}

        /* Modals */
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(17,17,17,.45);z-index:200;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(3px)}
        .modal-overlay.active{display:flex}
        .modal{background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border:1px solid var(--border-light)}
        .modal-header{padding:22px 24px 18px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
        .modal-title{font-family:'DM Serif Display',serif;font-size:1.15rem;font-weight:400}
        .modal-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1px solid var(--gray-200);background:var(--white);border-radius:8px;cursor:pointer;font-size:1.1rem;color:var(--text-light);transition:all var(--transition)}
        .modal-close:hover{background:var(--danger-light);color:var(--danger);border-color:#fecaca}
        .modal-body{padding:22px 24px 26px}
        .slot-form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .repeat-section{margin-top:18px;padding-top:18px;border-top:1px solid var(--border-light)}
        .repeat-label{font-size:.82rem;font-weight:600;color:var(--gray-600);margin-bottom:10px}
        .day-checkboxes{display:flex;gap:6px;flex-wrap:wrap}
        .day-checkbox{display:flex;align-items:center;justify-content:center;width:40px;height:36px;border:2px solid var(--gray-200);border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all var(--transition);color:var(--gray-600);background:var(--card);user-select:none}
        .day-checkbox:hover{border-color:var(--black)}.day-checkbox.active{background:var(--black);color:white;border-color:var(--black)}
        .detail-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-light);font-size:.9rem}
        .detail-row:last-child{border-bottom:none}.detail-label{color:var(--text-light);font-weight:500}.detail-value{font-weight:600;color:var(--text);text-align:right}
        .detail-actions{display:flex;gap:10px;margin-top:22px}
        .btn-danger{padding:12px 18px;background:var(--danger);color:white;border:none;border-radius:var(--radius);font-size:.88rem;font-weight:600;font-family:inherit;cursor:pointer;transition:background var(--transition);flex:1}
        .btn-danger:hover{background:#a93226}
        .btn-secondary{padding:12px 18px;background:var(--bg);color:var(--text);border:2px solid var(--gray-200);border-radius:var(--radius);font-size:.88rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all var(--transition);flex:1}
        .btn-secondary:hover{border-color:var(--gray-400)}

        .toast{position:fixed;bottom:24px;right:24px;background:var(--black);color:white;padding:14px 22px;border-radius:var(--radius);font-size:.88rem;font-weight:500;box-shadow:var(--shadow-lg);z-index:300;transform:translateY(80px);opacity:0;transition:all .3s ease}
        .toast.active{transform:translateY(0);opacity:1}.toast.error{background:var(--danger)}.toast.success{background:var(--black)}
        .spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
        @keyframes spin{to{transform:rotate(360deg)}}

        @media(max-width:768px){
            .topbar{padding:0 14px}.topbar-brand,.topbar-divider{display:none}
            .topbar-property-select{max-width:180px;font-size:.8rem}
            .dash-body{padding:14px}.cal-grid,.cal-body{grid-template-columns:48px repeat(7,1fr)}
            .cal-time-label{font-size:.65rem}.cal-day-name{font-size:.65rem}.cal-day-num{font-size:.95rem}
            .slot-block{padding:2px 4px;font-size:.68rem}.stats-bar{gap:8px}.stat-card{padding:10px 14px}
            .week-label{font-size:.95rem;min-width:unset}.login-card{padding:36px 24px}
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
    <div class="login-card">
        <div class="login-brand">AGM Real Estate Group</div>
        <h1 class="login-heading" id="login-heading">Tour Manager</h1>
        <p class="login-sub" id="login-sub">Sign in to manage tour availability</p>
        <div class="form-error" id="login-error"></div>
        <div class="form-group"><label class="form-label" id="password-label">Password</label><input class="form-input" id="login-password" type="password" placeholder="Enter admin password"></div>
        <div class="form-group" id="confirm-group" style="display:none;"><label class="form-label">Confirm Password</label><input class="form-input" id="login-confirm" type="password" placeholder="Re-enter password"></div>
        <button class="form-btn" id="login-btn" onclick="handleLogin()">Sign In</button>
        <div class="login-toggle" id="login-toggle">First time? <a onclick="toggleSetupMode()">Set up password</a></div>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <div class="topbar">
        <div class="topbar-left">
            <span class="topbar-brand">AGM</span>
            <span class="topbar-divider"></span>
            <select class="topbar-property-select" id="dash-property-select" onchange="switchProperty(this.value)"></select>
        </div>
        <div class="topbar-actions"><button class="topbar-btn danger" onclick="handleLogout()">Sign Out</button></div>
    </div>
    <div class="dash-body">
        <div class="stats-bar">
            <div class="stat-card"><div class="stat-num green" id="stat-available">-</div><div class="stat-label">Available this week</div></div>
            <div class="stat-card"><div class="stat-num amber" id="stat-booked">-</div><div class="stat-label">Booked this week</div></div>
            <div class="stat-card"><div class="stat-num" id="stat-total">-</div><div class="stat-label">Total slots</div></div>
        </div>
        <div class="week-header">
            <div class="week-nav"><button class="nav-btn" onclick="changeWeek(-1)">&#8249;</button><span class="week-label" id="week-label"></span><button class="nav-btn" onclick="changeWeek(1)">&#8250;</button><button class="today-btn" onclick="goToday()">Today</button></div>
            <button class="add-slot-btn" onclick="openAddModal()">+ Add Availability</button>
        </div>
        <div class="calendar-card"><div class="cal-grid" id="cal-header"><div class="cal-header-corner"><span>Time</span></div></div><div class="cal-body" id="cal-body"></div></div>
    </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal"><div class="modal"><div class="modal-header"><span class="modal-title">Add Availability</span><button class="modal-close" onclick="closeModal('add-modal')">&times;</button></div><div class="modal-body">
    <div class="form-error" id="add-error"></div>
    <div class="form-group"><label class="form-label">Date</label><input class="form-input" id="add-date" type="date"></div>
    <div class="slot-form-row"><div class="form-group"><label class="form-label">Start Time</label><input class="form-input" id="add-start" type="time" value="09:00"></div><div class="form-group"><label class="form-label">End Time</label><input class="form-input" id="add-end" type="time" value="10:00"></div></div>
    <div class="repeat-section"><div class="repeat-label">Repeat on additional days this week:</div><div class="day-checkboxes" id="repeat-days"><div class="day-checkbox" data-day="1">Mo</div><div class="day-checkbox" data-day="2">Tu</div><div class="day-checkbox" data-day="3">We</div><div class="day-checkbox" data-day="4">Th</div><div class="day-checkbox" data-day="5">Fr</div><div class="day-checkbox" data-day="6">Sa</div><div class="day-checkbox" data-day="0">Su</div></div></div>
    <button class="form-btn" id="add-submit-btn" onclick="handleAddSlot()" style="margin-top:20px;">Create Slot(s)</button>
</div></div></div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal"><div class="modal"><div class="modal-header"><span class="modal-title" id="detail-title">Slot Details</span><button class="modal-close" onclick="closeModal('detail-modal')">&times;</button></div><div class="modal-body" id="detail-body"></div></div></div>

<div class="toast" id="toast"></div>

<script>
    const API_BASE=window.location.origin+'/api';
    const HOUR_HEIGHT=48,START_HOUR=7,END_HOUR=19;
    const DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONTH_NAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const MONTH_LONG=['January','February','March','April','May','June','July','August','September','October','November','December'];

    const ALL_PROPERTIES=["301 Apartments","6113 Apartments","Arbor Heights","Avia Apartments","BalCro","Bayview Apartments","Blanche Clare Apartments","Cedar Lane Apartments","Clift House Apartments","Crestview Townhomes","De Selm Apartments","East Union Apartments","Fairlake Quads","Fremont Village","Gary Apartments","Gilmanor Apartments","Golden Inca","Highway Place","Hill Town Apartments","Lorelei Apartments","Marianne Apartments","Mercer Tower","Niwa Apartments","Ondine Eastlake","Quil Creek Crossing Apartments","Ramesh House","Reverie Apartments","Rialto Court","Royal View Apartments","Seward Park","Skandi Villa","The Palms","Viewmont Apartments","White Heather Apartments","Willow Creek","Winslow Place"].sort();

    let authToken=null,currentProperty=null,currentWeekStart=null,slotsData=[],isSetupMode=false;

    document.addEventListener('DOMContentLoaded',()=>{
        populateDashPropertyDropdown();
        setCurrentWeekStart(getMondayOfWeek(new Date()));
        checkSavedSession();
    });

    function populateDashPropertyDropdown(){
        const sel=document.getElementById('dash-property-select');
        ALL_PROPERTIES.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;sel.appendChild(o);});
    }

    function checkSavedSession(){
        const saved=sessionStorage.getItem('agm_tour_session');
        if(saved){try{const s=JSON.parse(saved);if(new Date(s.expires_at)>new Date()){authToken=s.token;currentProperty=s.property||ALL_PROPERTIES[0];showDashboard();}}catch(e){}}
    }

    // AUTH
    function toggleSetupMode(){
        isSetupMode=!isSetupMode;
        const h=document.getElementById('login-heading'),s=document.getElementById('login-sub'),b=document.getElementById('login-btn'),t=document.getElementById('login-toggle'),c=document.getElementById('confirm-group'),l=document.getElementById('password-label');
        if(isSetupMode){h.textContent='Set Up Password';s.textContent='Create a master admin password';b.textContent='Create Password';t.innerHTML='Already have a password? <a onclick="toggleSetupMode()">Sign in</a>';c.style.display='block';l.textContent='New Password';}
        else{h.textContent='Tour Manager';s.textContent='Sign in to manage tour availability';b.textContent='Sign In';t.innerHTML='First time? <a onclick="toggleSetupMode()">Set up password</a>';c.style.display='none';l.textContent='Password';}
        hideError('login-error');
    }

    async function handleLogin(){
        const password=document.getElementById('login-password').value,confirm=document.getElementById('login-confirm').value,btn=document.getElementById('login-btn');
        if(!password)return showError('login-error','Please enter a password.');
        if(password.length<6)return showError('login-error','Password must be at least 6 characters.');
        if(isSetupMode&&password!==confirm)return showError('login-error','Passwords do not match.');
        hideError('login-error');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
        try{
            const body={password};if(isSetupMode)body.action='setup';
            const res=await fetch(API_BASE+'/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
            const data=await res.json();if(!res.ok)throw new Error(data.error||'Login failed.');
            authToken=data.token;
            // Load last-used property or default to first
            const lastProp=localStorage.getItem('agm_last_property');
            currentProperty=lastProp&&ALL_PROPERTIES.includes(lastProp)?lastProp:ALL_PROPERTIES[0];
            sessionStorage.setItem('agm_tour_session',JSON.stringify({token:data.token,property:currentProperty,expires_at:data.expires_at}));
            showDashboard();
        }catch(err){showError('login-error',err.message);}
        finally{btn.disabled=false;btn.textContent=isSetupMode?'Create Password':'Sign In';}
    }

    function handleLogout(){authToken=null;currentProperty=null;sessionStorage.removeItem('agm_tour_session');document.getElementById('dashboard').classList.remove('active');document.getElementById('login-screen').classList.remove('hidden');document.getElementById('login-password').value='';document.getElementById('login-confirm').value='';if(isSetupMode)toggleSetupMode();}

    function showDashboard(){
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard').classList.add('active');
        document.getElementById('dash-property-select').value=currentProperty;
        loadSlots();
    }

    function switchProperty(prop){
        currentProperty=prop;
        localStorage.setItem('agm_last_property',prop);
        // Update session storage
        const saved=sessionStorage.getItem('agm_tour_session');
        if(saved){try{const s=JSON.parse(saved);s.property=prop;sessionStorage.setItem('agm_tour_session',JSON.stringify(s));}catch(e){}}
        slotsData=[];renderSlots();loadSlots();
    }

    // WEEK NAV
    function getMondayOfWeek(date){const d=new Date(date);const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);d.setHours(0,0,0,0);return d;}
    function setCurrentWeekStart(m){currentWeekStart=new Date(m);updateWeekLabel();renderCalendarStructure();}
    function changeWeek(delta){const d=new Date(currentWeekStart);d.setDate(d.getDate()+delta*7);setCurrentWeekStart(d);if(authToken)loadSlots();}
    function goToday(){setCurrentWeekStart(getMondayOfWeek(new Date()));if(authToken)loadSlots();}
    function updateWeekLabel(){const e=new Date(currentWeekStart);e.setDate(e.getDate()+6);document.getElementById('week-label').textContent=MONTH_NAMES[currentWeekStart.getMonth()]+' '+currentWeekStart.getDate()+' \u2013 '+MONTH_NAMES[e.getMonth()]+' '+e.getDate()+', '+e.getFullYear();}
    function getWeekDates(){const d=[];for(let i=0;i<7;i++){const x=new Date(currentWeekStart);x.setDate(x.getDate()+i);d.push(x);}return d;}
    function formatDateISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

    // CALENDAR
    function renderCalendarStructure(){
        const dates=getWeekDates(),today=new Date();today.setHours(0,0,0,0);
        const header=document.getElementById('cal-header');header.innerHTML='<div class="cal-header-corner"><span>Time</span></div>';
        dates.forEach(d=>{const isToday=d.getTime()===today.getTime();const cell=document.createElement('div');cell.className='cal-header-cell'+(isToday?' today':'');cell.innerHTML='<div class="cal-day-name">'+DAY_NAMES[d.getDay()]+'</div><div class="cal-day-num">'+d.getDate()+'</div>';header.appendChild(cell);});
        const body=document.getElementById('cal-body');body.innerHTML='';
        const timeCol=document.createElement('div');timeCol.className='cal-time-col';
        for(let h=START_HOUR;h<=END_HOUR;h++){const label=document.createElement('div');label.className='cal-time-label';label.style.height=HOUR_HEIGHT+'px';label.textContent=(h%12||12)+' '+(h>=12?'PM':'AM');timeCol.appendChild(label);}
        body.appendChild(timeCol);
        dates.forEach(d=>{const col=document.createElement('div');col.className='cal-day-col';col.dataset.date=formatDateISO(d);col.style.height=((END_HOUR-START_HOUR)*HOUR_HEIGHT)+'px';
            for(let h=0;h<=END_HOUR-START_HOUR;h++){const line=document.createElement('div');line.className='cal-hour-line';line.style.top=(h*HOUR_HEIGHT)+'px';col.appendChild(line);}
            const zone=document.createElement('div');zone.className='click-zone';zone.onclick=()=>openAddModal(formatDateISO(d));col.appendChild(zone);body.appendChild(col);});
        renderSlots();
    }

    function renderSlots(){
        document.querySelectorAll('.slot-block').forEach(el=>el.remove());
        const dates=getWeekDates(),dateToCol={};dates.forEach(d=>{dateToCol[formatDateISO(d)]=true;});
        slotsData.forEach(slot=>{
            if(!dateToCol[slot.date])return;
            const col=document.querySelector('.cal-day-col[data-date="'+slot.date+'"]');if(!col)return;
            const startMin=timeToMinutes(slot.start_time),endMin=timeToMinutes(slot.end_time);
            const topOffset=((startMin-START_HOUR*60)/60)*HOUR_HEIGHT,height=((endMin-startMin)/60)*HOUR_HEIGHT;
            if(topOffset<0||height<=0)return;
            const block=document.createElement('div');block.className='slot-block '+slot.status;block.style.top=topOffset+'px';block.style.height=Math.max(height-2,18)+'px';
            block.onclick=(e)=>{e.stopPropagation();openDetailModal(slot);};
            block.innerHTML='<div class="slot-time">'+formatTime12(slot.start_time)+' \u2013 '+formatTime12(slot.end_time)+'</div>';
            if(slot.status==='booked'&&slot.booking){block.innerHTML+='<div class="slot-label">'+escapeHtml(slot.booking.first_name)+'</div>';}
            else{block.innerHTML+='<div class="slot-label">Available</div>';}
            col.appendChild(block);
        });
        const avail=slotsData.filter(s=>s.status==='available').length,booked=slotsData.filter(s=>s.status==='booked').length;
        document.getElementById('stat-available').textContent=avail;document.getElementById('stat-booked').textContent=booked;document.getElementById('stat-total').textContent=avail+booked;
    }

    // API
    async function loadSlots(){
        const dates=getWeekDates(),from=formatDateISO(dates[0]),to=formatDateISO(dates[6]);
        try{const res=await fetch(API_BASE+'/slots?property='+encodeURIComponent(currentProperty)+'&from='+from+'&to='+to,{headers:{'Authorization':'Bearer '+authToken}});const data=await res.json();slotsData=data.slots||[];renderSlots();}
        catch(err){showToast('Failed to load slots','error');}
    }

    async function createSlots(slotsArray){
        const res=await fetch(API_BASE+'/slots',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+authToken},body:JSON.stringify({property:currentProperty,slots:slotsArray})});
        const data=await res.json();if(!res.ok)throw new Error(data.error||'Failed to create slots.');return data;
    }

    async function deleteSlot(slotId){const res=await fetch(API_BASE+'/slots?id='+slotId,{method:'DELETE',headers:{'Authorization':'Bearer '+authToken}});const data=await res.json();if(!res.ok)throw new Error(data.error||'Failed to delete.');return data;}

    // MODALS
    function openAddModal(prefilledDate){
        const dateInput=document.getElementById('add-date');dateInput.value=prefilledDate||formatDateISO(new Date());dateInput.min=formatDateISO(new Date());
        document.querySelectorAll('.day-checkbox').forEach(cb=>cb.classList.remove('active'));
        if(prefilledDate){const d=new Date(prefilledDate+'T12:00:00');const cb=document.querySelector('.day-checkbox[data-day="'+d.getDay()+'"]');if(cb)cb.classList.add('active');}
        hideError('add-error');document.getElementById('add-modal').classList.add('active');
    }
    function closeModal(id){document.getElementById(id).classList.remove('active');}
    document.querySelectorAll('.day-checkbox').forEach(cb=>{cb.addEventListener('click',()=>cb.classList.toggle('active'));});

    async function handleAddSlot(){
        const date=document.getElementById('add-date').value,startTime=document.getElementById('add-start').value,endTime=document.getElementById('add-end').value,btn=document.getElementById('add-submit-btn');
        if(!date||!startTime||!endTime)return showError('add-error','Please fill in date, start time, and end time.');
        if(endTime<=startTime)return showError('add-error','End time must be after start time.');
        const activeDays=[];document.querySelectorAll('.day-checkbox.active').forEach(cb=>{activeDays.push(parseInt(cb.dataset.day));});
        const slotsToCreate=[{date,start_time:startTime,end_time:endTime}];
        if(activeDays.length>0){const baseDate=new Date(date+'T12:00:00');const weekMonday=getMondayOfWeek(baseDate);
            activeDays.forEach(targetDay=>{const offset=targetDay===0?6:targetDay-1;const targetDate=new Date(weekMonday);targetDate.setDate(weekMonday.getDate()+offset);const ds=formatDateISO(targetDate);if(ds!==date)slotsToCreate.push({date:ds,start_time:startTime,end_time:endTime});});}
        hideError('add-error');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
        try{const result=await createSlots(slotsToCreate);showToast(result.created+' slot'+(result.created>1?'s':'')+' created','success');closeModal('add-modal');await loadSlots();}
        catch(err){showError('add-error',err.message);}
        finally{btn.disabled=false;btn.textContent='Create Slot(s)';}
    }

    function openDetailModal(slot){
        const title=document.getElementById('detail-title'),body=document.getElementById('detail-body');
        const dateF=formatDateLong(slot.date),timeStr=formatTime12(slot.start_time)+' \u2013 '+formatTime12(slot.end_time);
        if(slot.status==='booked'&&slot.booking){
            title.textContent='Booked Tour';
            body.innerHTML='<div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">'+dateF+'</span></div><div class="detail-row"><span class="detail-label">Time</span><span class="detail-value">'+timeStr+'</span></div><div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">'+escapeHtml(slot.booking.first_name+' '+(slot.booking.last_name||''))+'</span></div><div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">'+escapeHtml(slot.booking.email)+'</span></div><div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">'+escapeHtml(slot.booking.phone)+'</span></div><div class="detail-row"><span class="detail-label">Booked</span><span class="detail-value">'+formatDateTime(slot.booking.booked_at)+'</span></div><div class="detail-actions"><button class="btn-secondary" onclick="closeModal(\'detail-modal\')">Close</button><button class="btn-danger" onclick="handleCancelBooking('+slot.id+')">Cancel Booking</button></div>';
        }else{
            title.textContent='Available Slot';
            body.innerHTML='<div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">'+dateF+'</span></div><div class="detail-row"><span class="detail-label">Time</span><span class="detail-value">'+timeStr+'</span></div><div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">Available</span></div><div class="detail-actions"><button class="btn-secondary" onclick="closeModal(\'detail-modal\')">Close</button><button class="btn-danger" onclick="handleDeleteSlot('+slot.id+')">Delete Slot</button></div>';
        }
        document.getElementById('detail-modal').classList.add('active');
    }

    async function handleDeleteSlot(slotId){if(!confirm('Delete this availability slot?'))return;try{await deleteSlot(slotId);showToast('Slot deleted','success');closeModal('detail-modal');await loadSlots();}catch(err){showToast(err.message,'error');}}

    async function handleCancelBooking(slotId){
        if(!confirm('Cancel this booking? The slot will become available again.'))return;
        try{const res=await fetch(API_BASE+'/book?slot_id='+slotId,{method:'DELETE',headers:{'Authorization':'Bearer '+authToken}});if(!res.ok)throw new Error('Could not cancel booking.');showToast('Booking cancelled','success');closeModal('detail-modal');await loadSlots();}
        catch(err){showToast(err.message,'error');}
    }

    // UTILS
    function timeToMinutes(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
    function formatTime12(t){const[h,m]=t.split(':').map(Number);return(h%12||12)+':'+String(m).padStart(2,'0')+(h>=12?'PM':'AM');}
    function formatDateLong(s){const d=new Date(s+'T12:00:00');return DAY_NAMES[d.getDay()]+', '+MONTH_LONG[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();}
    function formatDateTime(s){if(!s)return'-';const d=new Date(s);return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});}
    function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
    function showError(id,msg){const e=document.getElementById(id);e.textContent=msg;e.classList.add('active');}
    function hideError(id){const e=document.getElementById(id);e.textContent='';e.classList.remove('active');}
    function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'')+' active';setTimeout(()=>{t.classList.remove('active');},3000);}
</script>
</body>
</html>
